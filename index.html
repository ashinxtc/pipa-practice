<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>琵琶练习台 - 动态力度版</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --primary-glow: rgba(76, 175, 80, 0.6);
            --bg-dark: #0f0f13;
            --bg-panel: #1a1a20;
            --text-main: #ffffff;
            --text-muted: #8a8a93;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .panel {
            background-color: var(--bg-panel);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 26px; color: var(--primary); letter-spacing: 1px;}
        
        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-ai {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            box-shadow: 0 4px 15px rgba(167, 119, 227, 0.4);
        }
        .btn-ai:hover { box-shadow: 0 6px 20px rgba(167, 119, 227, 0.5); }
        
        .ai-panel {
            background: rgba(167, 119, 227, 0.08);
            border: 1px solid rgba(167, 119, 227, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            font-size: 15px;
            line-height: 1.7;
            position: relative;
            overflow: hidden;
        }
        .ai-panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, #6e8efb, #a777e3);
        }
        .ai-panel h4 { margin-top: 0; color: #bca0eb; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 18px; }

        .game-area {
            position: relative;
            width: 100%;
            height: 220px;
            background: linear-gradient(to bottom, #0a0a0c, #111115);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            margin-top: 15px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        .hud {
            position: absolute;
            top: 15px;
            right: 25px;
            text-align: right;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .score { font-size: 32px; font-weight: 900; color: #FFD700; font-family: monospace; letter-spacing: 2px;}
        .combo { font-size: 18px; color: #4CAF50; font-weight: bold; margin-top: -5px;}
        .express-score { font-size: 14px; color: #a777e3; margin-top: 5px; }
        
        .judgement-text {
            position: absolute;
            top: 50%;
            left: 20%;
            transform: translate(-50%, -50%);
            font-size: 54px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            pointer-events: none;
            opacity: 0;
            text-shadow: 0 0 20px rgba(0,0,0,0.9);
            z-index: 10;
        }
        .anim-perfect { color: #00FFFF; text-shadow: 0 0 20px #00FFFF, 0 0 40px #00FFFF; animation: popFade 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .anim-great { color: #4CAF50; text-shadow: 0 0 20px #4CAF50; animation: popFade 0.5s ease-out forwards; }
        .anim-miss { color: #F44336; animation: dropFade 0.5s ease-in forwards; }

        @keyframes popFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -60%) scale(0.9); }
        }
        @keyframes dropFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -20%) scale(0.8); }
        }

        .log-box {
            background: #050505;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            color: #4CAF50;
            font-size: 12px;
            border-radius: 8px;
            height: 120px;
            overflow-y: auto;
            border: 1px solid #222;
            line-height: 1.5;
        }
        .media-container { width: 100%; border-radius: 8px; overflow: hidden; background: #000; display: flex; justify-content: center; min-height: 100px; margin-bottom: 20px;}
        video { width: 100%; max-height: 300px; }
        audio { width: 90%; margin: 20px 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script id="worker-script" type="javascript/worker">
        self.onerror = function(err) { self.postMessage({ status: 'error', msg: '后台分析线程异常' }); };

        self.onmessage = async function(e) {
            const { type, audioData, sampleRate, sensitivity, minGapMs } = e.data;
            if (type === 'ANALYZE') {
                self.postMessage({ status: 'info', msg: '🔥 启动琵琶动态力度分析引擎...' });

                const analyzeAudio = (audio, sr) => {
                    const windowSize = 1024, hopSize = 512;
                    const energies = [], energyFlux = [], onsets = [];
                    let maxEnergy = 0; 

                    self.postMessage({ status: 'info', msg: '⚙️ 正在提取能量波带数据...' });

                    for (let i = 0; i < audio.length - windowSize; i += hopSize) {
                        let sum = 0;
                        for (let j = 0; j < windowSize; j++) sum += audio[i + j] * audio[i + j];
                        const rms = Math.sqrt(sum / windowSize);
                        energies.push(rms);
                        if (rms > maxEnergy) maxEnergy = rms;
                    }

                    for (let i = 1; i < energies.length; i++) {
                        let diff = energies[i] - energies[i-1];
                        energyFlux.push(diff > 0 ? diff : 0);
                    }
                    energyFlux.unshift(0);

                    const meanWindow = 15;
                    const minOnsetGapFrames = Math.floor((minGapMs / 1000) * sr / hopSize);
                    let lastOnsetFrame = -minOnsetGapFrames;

                    for (let i = meanWindow; i < energyFlux.length - 1; i++) {
                        if (energyFlux[i] > energyFlux[i - 1] && energyFlux[i] > energyFlux[i + 1]) {
                            let sum = 0;
                            for (let j = 1; j <= meanWindow; j++) sum += energyFlux[i - j];
                            let localMean = sum / meanWindow;

                            if (energyFlux[i] > localMean * sensitivity && energyFlux[i] > 0.005) {
                                if (i - lastOnsetFrame >= minOnsetGapFrames) {
                                    onsets.push(((i * hopSize) / sr) * 1000); 
                                    lastOnsetFrame = i;
                                }
                            }
                        }
                    }

                    const envSampleRate = 10; 
                    const envHopFrames = Math.floor(sr / hopSize / envSampleRate);
                    const envelope = [];
                    
                    for (let i = 0; i < energies.length; i += envHopFrames) {
                        let localMax = 0;
                        for(let j = 0; j < envHopFrames && (i+j) < energies.length; j++){
                            if(energies[i+j] > localMax) localMax = energies[i+j];
                        }
                        envelope.push({
                            time: ((i * hopSize) / sr) * 1000,
                            intensity: maxEnergy > 0 ? (localMax / maxEnergy) : 0
                        });
                    }

                    return { onsets, envelope };
                };

                setTimeout(() => {
                    const result = analyzeAudio(audioData, sampleRate || 44100);
                    self.postMessage({
                        status: 'success',
                        msg: `✨ 分析完毕！提取音符: ${result.onsets.length}个，生成动态波带节点: ${result.envelope.length}个。`,
                        data: result
                    });
                }, 50);
            }
        };
    </script>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        const RibbonGameArea = ({ mediaRef, beatmapData, isPlaying }) => {
            const canvasRef = useRef(null);
            const reqRef = useRef(null);
            const { onsets, envelope } = beatmapData;
            
            const [score, setScore] = useState(0);
            const [combo, setCombo] = useState(0);
            const [expressScore, setExpressScore] = useState(0);
            const [judgement, setJudgement] = useState({ text: '', type: '', id: 0 });
            
            const micCtxRef = useRef(null);
            const analyserRef = useRef(null);
            const isMicReady = useRef(false);

            const gs = useRef({
                lastJudgedIndex: -1,
                cooldownUntil: 0,
                speed: 0.3, 
                judgementLineX: 0,
                playerMaxVolHistory: 0.01,
                currentPlayerVol: 0 
            });

            const THRESHOLD = 0.1; 
            const PERFECT_WIN = 100;
            const GREAT_WIN = 200;   
            const COOLDOWN = 120;
            const RIBBON_BASE_HEIGHT = 10; 
            const RIBBON_MAX_HEIGHT = 80;  

            useEffect(() => {
                const media = mediaRef.current;
                if (!media) return;

                const handleSeek = () => {
                    const currentTime = media.currentTime * 1000;
                    
                    if (currentTime < 100) {
                        setScore(0);
                        setCombo(0);
                        setExpressScore(0);
                    }
                    
                    let newIndex = -1;
                    for (let i = 0; i < onsets.length; i++) {
                        if (onsets[i] < currentTime - GREAT_WIN) {
                            newIndex = i; 
                        } else {
                            break;
                        }
                    }
                    gs.current.lastJudgedIndex = newIndex;
                    gs.current.cooldownUntil = 0;
                    setJudgement({ text: '', type: '', id: Date.now() }); 
                };

                media.addEventListener('seeked', handleSeek);
                return () => media.removeEventListener('seeked', handleSeek);
            }, [onsets]);

            useEffect(() => {
                const initMic = async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        micCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                        analyserRef.current = micCtxRef.current.createAnalyser();
                        analyserRef.current.fftSize = 256;
                        analyserRef.current.smoothingTimeConstant = 0.6; 
                        const source = micCtxRef.current.createMediaStreamSource(stream);
                        source.connect(analyserRef.current);
                        isMicReady.current = true;
                    } catch (e) { console.error("麦克风权限被拒绝", e); }
                };
                initMic();
                return () => { if (micCtxRef.current) micCtxRef.current.close(); };
            }, []);

            const loop = useCallback(() => {
                const canvas = canvasRef.current;
                const media = mediaRef.current;
                if (!canvas || !media || !isMicReady.current) {
                    reqRef.current = requestAnimationFrame(loop);
                    return;
                }

                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const centerY = height / 2;
                const currentTime = media.currentTime * 1000;
                
                gs.current.judgementLineX = width * 0.2; 
                const { judgementLineX, speed, lastJudgedIndex } = gs.current;

                const bufferLength = analyserRef.current.frequencyBinCount;
                const dataArray = new Float32Array(bufferLength);
                analyserRef.current.getFloatTimeDomainData(dataArray);
                
                let sum = 0;
                for (let i = 0; i < bufferLength; i++) sum += dataArray[i] * dataArray[i];
                let rms = Math.sqrt(sum / bufferLength);

                if (rms > gs.current.playerMaxVolHistory) {
                    gs.current.playerMaxVolHistory = rms;
                } else {
                    gs.current.playerMaxVolHistory *= 0.9995; 
                }
                
                let relativeVol = gs.current.playerMaxVolHistory > 0 ? (rms / gs.current.playerMaxVolHistory) : 0;
                gs.current.currentPlayerVol = Math.min(1, relativeVol * 1.5); 

                if (rms > THRESHOLD && performance.now() > gs.current.cooldownUntil) {
                    let minDiff = Infinity;
                    let targetIndex = -1;
                    
                    for (let i = lastJudgedIndex + 1; i < onsets.length; i++) {
                        const diff = Math.abs(currentTime - onsets[i]);
                        if (diff < minDiff) { minDiff = diff; targetIndex = i; }
                    }

                    if (targetIndex !== -1 && minDiff <= GREAT_WIN) {
                        gs.current.lastJudgedIndex = targetIndex;
                        gs.current.cooldownUntil = performance.now() + COOLDOWN;
                        
                        let expectedIntensity = 0;
                        for(let i=0; i<envelope.length; i++) {
                            if(envelope[i].time > currentTime) {
                                expectedIntensity = i > 0 ? envelope[i-1].intensity : envelope[0].intensity;
                                break;
                            }
                        }

                        let intensityDiff = Math.abs(gs.current.currentPlayerVol - expectedIntensity);
                        let expressBonus = 0;
                        if(intensityDiff < 0.2) expressBonus = 50; 
                        else if(intensityDiff < 0.4) expressBonus = 20;

                        if (minDiff <= PERFECT_WIN) {
                            setJudgement({ text: 'Perfect', type: 'anim-perfect', id: Date.now() });
                            setScore(s => s + 100 + expressBonus);
                            setCombo(c => c + 1);
                        } else {
                            setJudgement({ text: 'Great', type: 'anim-great', id: Date.now() });
                            setScore(s => s + 50 + Math.floor(expressBonus/2));
                            setCombo(c => c + 1);
                        }
                        
                        if(expressBonus > 0) {
                            setExpressScore(prev => prev + expressBonus);
                        }
                    }
                }

                ctx.clearRect(0, 0, width, height);

                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(255, 215, 0, 0.6)';
                ctx.beginPath();
                ctx.moveTo(judgementLineX, 20);
                ctx.lineTo(judgementLineX, height - 20);
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.shadowBlur = 0; 

                ctx.beginPath();
                let visibleEnv = envelope.filter(pt => {
                    const x = (pt.time - currentTime) * speed + judgementLineX;
                    return x > -100 && x < width + 100;
                });

                if (visibleEnv.length > 1) {
                    ctx.moveTo((visibleEnv[0].time - currentTime) * speed + judgementLineX, centerY - (RIBBON_BASE_HEIGHT + visibleEnv[0].intensity * RIBBON_MAX_HEIGHT));
                    for (let i = 1; i < visibleEnv.length - 1; i++) {
                        const xc = (visibleEnv[i].time - currentTime) * speed + judgementLineX;
                        const yc = centerY - (RIBBON_BASE_HEIGHT + visibleEnv[i].intensity * RIBBON_MAX_HEIGHT);
                        const nextXc = (visibleEnv[i+1].time - currentTime) * speed + judgementLineX;
                        const nextYc = centerY - (RIBBON_BASE_HEIGHT + visibleEnv[i+1].intensity * RIBBON_MAX_HEIGHT);
                        const midX = (xc + nextXc) / 2;
                        const midY = (yc + nextYc) / 2;
                        ctx.quadraticCurveTo(xc, yc, midX, midY);
                    }
                    
                    const lastPt = visibleEnv[visibleEnv.length-1];
                    const lastX = (lastPt.time - currentTime) * speed + judgementLineX;
                    ctx.lineTo(lastX, centerY + (RIBBON_BASE_HEIGHT + lastPt.intensity * RIBBON_MAX_HEIGHT));
                    
                    for (let i = visibleEnv.length - 2; i > 0; i--) {
                        const xc = (visibleEnv[i].time - currentTime) * speed + judgementLineX;
                        const yc = centerY + (RIBBON_BASE_HEIGHT + visibleEnv[i].intensity * RIBBON_MAX_HEIGHT);
                        const prevXc = (visibleEnv[i-1].time - currentTime) * speed + judgementLineX;
                        const prevYc = centerY + (RIBBON_BASE_HEIGHT + visibleEnv[i-1].intensity * RIBBON_MAX_HEIGHT);
                        const midX = (xc + prevXc) / 2;
                        const midY = (yc + prevYc) / 2;
                        ctx.quadraticCurveTo(xc, yc, midX, midY);
                    }
                    ctx.lineTo((visibleEnv[0].time - currentTime) * speed + judgementLineX, centerY + (RIBBON_BASE_HEIGHT + visibleEnv[0].intensity * RIBBON_MAX_HEIGHT));
                    
                    ctx.closePath();
                    const gradient = ctx.createLinearGradient(0, 0, width, 0);
                    gradient.addColorStop(0, 'rgba(100, 200, 255, 0.1)'); 
                    gradient.addColorStop(0.2, 'rgba(100, 200, 255, 0.4)'); 
                    gradient.addColorStop(1, 'rgba(100, 200, 255, 0.1)');
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(100, 200, 255, 0.6)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                for (let i = lastJudgedIndex + 1; i < onsets.length; i++) {
                    const noteTime = onsets[i];
                    const x = (noteTime - currentTime) * speed + judgementLineX;

                    if (x < judgementLineX - (GREAT_WIN * speed)) {
                        gs.current.lastJudgedIndex = i;
                        setJudgement({ text: 'Miss', type: 'anim-miss', id: Date.now() });
                        setCombo(0);
                        continue;
                    }

                    if (x > -20 && x < width + 20) {
                        ctx.beginPath();
                        ctx.arc(x, centerY, 4, 0, Math.PI * 2);
                        ctx.fillStyle = '#fff';
                        ctx.fill();
                    }
                }

                const playerBallRadius = 8 + (gs.current.currentPlayerVol * RIBBON_MAX_HEIGHT);
                ctx.beginPath();
                ctx.arc(judgementLineX, centerY, playerBallRadius, 0, Math.PI * 2);
                
                if(gs.current.currentPlayerVol > 0.8) {
                    ctx.fillStyle = 'rgba(255, 100, 100, 0.8)'; 
                    ctx.shadowColor = 'rgba(255, 100, 100, 1)';
                } else if (gs.current.currentPlayerVol < 0.2) {
                    ctx.fillStyle = 'rgba(150, 150, 150, 0.5)'; 
                    ctx.shadowColor = 'rgba(150, 150, 150, 0.5)';
                } else {
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.9)'; 
                    ctx.shadowColor = 'rgba(255, 215, 0, 1)';
                }
                
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0; 

                reqRef.current = requestAnimationFrame(loop);
            }, [onsets, envelope]);

            useEffect(() => {
                if (isPlaying) reqRef.current = requestAnimationFrame(loop);
                else cancelAnimationFrame(reqRef.current);
                return () => cancelAnimationFrame(reqRef.current);
            }, [isPlaying, loop]);

            useEffect(() => {
                const resize = () => {
                    const canvas = canvasRef.current;
                    if (canvas) {
                        canvas.width = canvas.parentElement.clientWidth;
                        canvas.height = canvas.parentElement.clientHeight;
                    }
                };
                resize();
                window.addEventListener('resize', resize);
                return () => window.removeEventListener('resize', resize);
            }, []);

            return (
                <div className="game-area">
                    <canvas ref={canvasRef}></canvas>
                    <div className="hud">
                        <div className="score">{score}</div>
                        <div className="combo">{combo > 0 ? `${combo} COMBO` : ''}</div>
                        {expressScore > 0 && <div className="express-score">🎵 表现力加分 +{expressScore}</div>}
                    </div>
                    <div key={judgement.id} className={`judgement-text ${judgement.type}`}>
                        {judgement.text}
                    </div>
                </div>
            );
        };

        function App() {
            const mediaRef = useRef(null);
            const workerRef = useRef(null);
            const fileInputRef = useRef(null);
            
            const [fileInfo, setFileInfo] = useState({ url: null, name: '', type: null, rawFile: null });
            const [beatmapData, setBeatmapData] = useState({ onsets: [], envelope: [] });
            const [isPlaying, setIsPlaying] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [logs, setLogs] = useState(["系统初始化完成。请先上传曲目文件。"]);
            
            const [pieceName, setPieceName] = useState('');
            const [aiResponse, setAiResponse] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [sensitivity, setSensitivity] = useState(1.6);
            const [minGap, setMinGap] = useState(60);
            const [aiHasSuggested, setAiHasSuggested] = useState(false);

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 8));

            useEffect(() => {
                const workerScript = document.getElementById('worker-script').textContent;
                const blob = new Blob([workerScript], { type: 'application/javascript' });
                workerRef.current = new Worker(URL.createObjectURL(blob));

                workerRef.current.onerror = () => addLog(`⚠️ 严重错误: 分析线程崩溃。`);
                workerRef.current.onmessage = (e) => {
                    const { status, msg, data } = e.data;
                    addLog(msg);
                    if (status === 'success') {
                        setBeatmapData(data);
                        setIsAnalyzing(false);
                    }
                };
                return () => workerRef.current.terminate();
            }, []);

            useEffect(() => {
                const media = mediaRef.current;
                if (!media) return;
                const onPlay = () => setIsPlaying(true);
                const onPause = () => setIsPlaying(false);
                media.addEventListener('play', onPlay);
                media.addEventListener('pause', onPause);
                media.addEventListener('seeking', onPause);
                return () => {
                    media.removeEventListener('play', onPlay);
                    media.removeEventListener('pause', onPause);
                    media.removeEventListener('seeking', onPause);
                };
            }, [fileInfo.url]);

            const processFileForAnalysis = async (file) => {
                setIsAnalyzing(true);
                addLog("正在提取时间戳与能量包络...");
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
                    const channelData = audioBuffer.getChannelData(0);
                    workerRef.current.postMessage({ 
                        type: 'ANALYZE', audioData: channelData, sampleRate: audioBuffer.sampleRate,
                        sensitivity: sensitivity, minGapMs: minGap
                    });
                    ctx.close();
                } catch (err) {
                    addLog("解析失败: " + err.message);
                    setIsAnalyzing(false);
                }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const isAudio = file.type.startsWith('audio/');
                setFileInfo({ url: URL.createObjectURL(file), name: file.name, type: isAudio ? 'audio' : 'video', rawFile: file });
                setPieceName(file.name.replace(/\.[^/.]+$/, ""));
                setAiResponse(''); setAiHasSuggested(false); setBeatmapData({ onsets: [], envelope: [] }); setIsPlaying(false);
                processFileForAnalysis(file);
            };

            const applyAiParamsAndRegenerate = () => {
                if (fileInfo.rawFile) {
                    setAiHasSuggested(false);
                    processFileForAnalysis(fileInfo.rawFile);
                }
            };

            const fetchAIAdvice = async () => {
                if (!pieceName) return;
                setIsAiLoading(true); setAiResponse('');
                const apiKey = ""; 
                
                // 【核心修改】将模型指定为标准的 gemini-2.5-flash，解决地区访问权限或预览模型受限问题
                const modelName = "gemini-2.5-flash"; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

                const prompt = `你是一位资深琵琶教育家。你的学生正练习《${pieceName}》。
请返回JSON格式：
1. advice: 300字左右的专业课前指导寄语（含简介、技巧提示、情感启发）。
2. recommendedSensitivity: 推荐的拾音灵敏度 (1.0-3.0)。
3. recommendedMinGap: 推荐的音符最小间隔 (20-150ms)。`;

                try {
                    const res = await fetch(url, {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    // 【核心修改】捕获详细的 HTTP 错误码
                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        throw new Error(`网络或授权异常 (状态码: ${res.status}) ${errData.error?.message || ''}`);
                    }
                    
                    const data = await res.json();
                    const jsonStr = data.candidates[0].content.parts[0].text;
                    const parsed = JSON.parse(jsonStr);
                    setAiResponse(parsed.advice);
                    setSensitivity(parsed.recommendedSensitivity);
                    setMinGap(parsed.recommendedMinGap);
                    setAiHasSuggested(true);
                    addLog(`✨ AI 调参 -> 灵敏度: ${parsed.recommendedSensitivity}, 间隔: ${parsed.recommendedMinGap}ms`);
                } catch (err) {
                    // 更直观的报错提示，帮助判断是否被网络防火墙阻挡
                    if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
                        setAiResponse(`网络连接失败！因为 Google 的服务器在国内无法直接访问。请检查你的设备是否已经开启了全局科学上网代理（Global Proxy）。`);
                    } else {
                        setAiResponse(`AI 老师遇到了一点小麻烦：${err.message}`);
                    }
                    addLog(`⚠️ AI 调参失败: ${err.message}`);
                } finally { setIsAiLoading(false); }
            };

            return (
                <div className="app-container">
                    <div className="panel">
                        <div className="header">
                            <h1>🎵 琵琶练习台 Pro <span style={{fontSize:'12px', color:'#a777e3'}}>动态力度追踪版</span></h1>
                        </div>

                        <div className="controls-row">
                            <input type="file" accept="video/*, audio/*, .mp3, .mp4, .wav, .m4a, .mov, .aac" onChange={handleFileUpload} ref={fileInputRef} style={{display: 'none'}} />
                            <button onClick={() => fileInputRef.current.click()}>📂 1. 加载练习曲目 (视/音频)</button>
                        </div>
                        
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flexWrap: 'wrap', marginBottom: '20px' }}>
                            <input type="text" value={pieceName} onChange={(e) => { setPieceName(e.target.value); setAiHasSuggested(false); }} placeholder="输入曲目名称..." style={{ padding: '12px', borderRadius: '8px', border: '1px solid #333', background: '#111', color: 'white', flex: 1, minWidth: '200px' }} />
                            <button className="btn-ai" onClick={fetchAIAdvice} disabled={isAiLoading || !pieceName}>
                                {isAiLoading ? '✨ 分析中...' : '✨ 召唤 AI 老师指导与调参'}
                            </button>
                        </div>

                        {aiResponse && (
                            <div className="ai-panel">
                                <h4>✨ AI 课前寄语</h4>
                                <div style={{ whiteSpace: 'pre-wrap' }}>{aiResponse}</div>
                                {aiHasSuggested && fileInfo.rawFile && (
                                    <div style={{ marginTop: '15px', padding: '15px', background: 'rgba(76, 175, 80, 0.1)', border: '1px solid rgba(76, 175, 80, 0.3)', borderRadius: '8px' }}>
                                        <div style={{ color: '#4CAF50', marginBottom: '10px', fontSize: '13px' }}>💡 已应用《{pieceName}》专属提取参数。</div>
                                        <button style={{ width: '100%' }} onClick={applyAiParamsAndRegenerate}>🚀 立即按新参数重新生成谱面</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {fileInfo.url && (
                            <div className="media-container">
                                {fileInfo.type === 'video' ? 
                                    <video ref={mediaRef} src={fileInfo.url} controls controlsList="nodownload" playsInline={true} webkit-playsinline="true" x5-playsinline="true" x5-video-player-type="h5" x5-video-player-fullscreen="false" /> 
                                    : <audio ref={mediaRef} src={fileInfo.url} controls />
                                }
                            </div>
                        )}

                        {beatmapData.onsets.length > 0 && (
                            <RibbonGameArea mediaRef={mediaRef} beatmapData={beatmapData} isPlaying={isPlaying} />
                        )}

                        <div style={{marginTop: '25px'}}>
                            <div style={{fontSize: '12px', color: 'var(--text-muted)', marginBottom: '8px', letterSpacing: '1px'}}>SYSTEM LOGS {isAnalyzing && "⚙️"}</div>
                            <div className="log-box">{logs.map((log, i) => <div key={i}>&gt; {log}</div>)}</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

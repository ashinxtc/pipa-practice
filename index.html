<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>琵琶练习台 - 动态力度版</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.28);
            --accent: #f472b6;
            --accent-glow: rgba(244, 114, 182, 0.28);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.35);
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-base: #07070d;
            --bg-panel: rgba(15, 15, 25, 0.72);
            --bg-elevated: rgba(22, 22, 34, 0.65);
            --bg-input: rgba(9, 9, 17, 0.88);
            --text-primary: #e2e8f0;
            --text-secondary: #8b9ab8;
            --text-muted: #4a5568;
            --border: rgba(255, 255, 255, 0.05);
            --border-accent: rgba(99, 102, 241, 0.22);
            --radius-card: 14px;
            --radius-inner: 9px;
            --radius-pill: 999px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 28px 20px 64px;
            line-height: 1.6;
        }

        /* ── Layout ── */
        .app-container {
            width: 100%;
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ── Top Bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2px;
        }

        .top-bar-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .top-bar-label .dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        /* ── Header ── */
        .header-section {
            text-align: center;
            padding: 32px 24px 26px;
            background: var(--bg-panel);
            border-radius: var(--radius-card);
            border: 1px solid var(--border);
            backdrop-filter: blur(24px);
            position: relative;
            overflow: hidden;
        }

        .header-section::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background:
                radial-gradient(ellipse 130% 70% at 12% 18%, rgba(99, 102, 241, 0.18) 0%, transparent 62%),
                radial-gradient(ellipse 90% 60% at 90% 80%, rgba(244, 114, 182, 0.12) 0%, transparent 58%),
                radial-gradient(ellipse 60% 40% at 50% 105%, rgba(99, 102, 241, 0.08) 0%, transparent 52%);
            pointer-events: none;
            z-index: 0;
        }

        .header-content { position: relative; z-index: 1; }

        .logo-icon { font-size: 40px; margin-bottom: 6px; display: inline-block; }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light) 0%, #c084fc 55%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.6px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ── Panel ── */
        .panel {
            background: var(--bg-panel);
            border-radius: var(--radius-card);
            border: 1px solid var(--border);
            backdrop-filter: blur(28px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.035);
        }

        .panel-header {
            padding: 18px 22px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .panel-title-icon {
            width: 3px; height: 16px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .panel-body { padding: 18px 22px 20px; }

        /* ── Control Row ── */
        .control-row {
            display: flex;
            align-items: center;
            gap: 9px;
            flex-wrap: wrap;
        }

        .control-row + .control-row { margin-top: 11px; }

        /* ── Input ── */
        .input-field {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-inner);
            padding: 9px 13px;
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-field::placeholder { color: var(--text-muted); }

        /* ── Buttons ── */
        .btn {
            -webkit-appearance: none; appearance: none;
            font-family: inherit;
            display: inline-flex; align-items: center; justify-content: center;
            gap: 6px;
            height: 36px; padding: 0 14px;
            border-radius: var(--radius-inner);
            font-weight: 600; font-size: 12px; letter-spacing: 0.02em;
            cursor: pointer; border: 1px solid transparent;
            position: relative; overflow: hidden;
            transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, color 0.2s, transform 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn:hover:not(:disabled) { transform: translateY(-1px); }
        .btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }
        .btn:disabled { opacity: 0.36; cursor: not-allowed; }

        .btn-primary {
            color: #fff;
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
            border-color: rgba(129, 140, 248, 0.28);
            box-shadow: 0 2px 14px rgba(99, 102, 241, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 5px 24px rgba(99, 102, 241, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .btn-ai {
            color: #fff;
            background: linear-gradient(135deg, #f472b6 0%, #a855f7 60%, #7c3aed 100%);
            border-color: rgba(244, 114, 182, 0.26);
            box-shadow: 0 2px 14px var(--accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.09);
        }

        .btn-ai:hover:not(:disabled) {
            box-shadow: 0 5px 24px rgba(168, 85, 247, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.14);
        }

        .btn-ghost {
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.025);
            border-color: var(--border);
        }

        .btn-ghost:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.09);
            border-color: rgba(129, 140, 248, 0.28);
            color: var(--primary-light);
        }

        .btn-icon {
            min-width: 36px; width: 36px; padding: 0;
            font-size: 16px; border-radius: var(--radius-inner);
        }

        /* ── Status Badge ── */
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            height: 26px; padding: 0 10px;
            border-radius: var(--radius-pill);
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.07em; text-transform: uppercase;
            background: rgba(9, 9, 17, 0.5);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .status-badge.ok {
            color: rgba(52, 211, 153, 0.88);
            border-color: rgba(16, 185, 129, 0.18);
            background: rgba(16, 185, 129, 0.06);
        }

        .status-badge.warn {
            color: rgba(251, 191, 36, 0.82);
            border-color: rgba(245, 158, 11, 0.18);
            background: rgba(245, 158, 11, 0.055);
        }

        .status-dot {
            width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
        }

        .status-dot.green { background: #34d399; box-shadow: 0 0 6px rgba(52, 211, 153, 0.65); }
        .status-dot.yellow { background: #fbbf24; box-shadow: 0 0 6px rgba(251, 191, 36, 0.55); }

        /* ── Divider ── */
        .divider {
            height: 1px; background: var(--border); margin: 16px 0;
        }

        /* ── AI Panel ── */
        .ai-panel {
            background: rgba(244, 114, 182, 0.045);
            border: 1px solid rgba(244, 114, 182, 0.14);
            border-left: 3px solid;
            border-image: linear-gradient(180deg, var(--accent), var(--primary)) 1;
            border-right-color: rgba(244, 114, 182, 0.14);
            border-top-color: rgba(244, 114, 182, 0.14);
            border-bottom-color: rgba(244, 114, 182, 0.14);
            border-radius: var(--radius-inner);
            padding: 16px 18px;
        }

        .ai-panel-header {
            display: flex; align-items: center; gap: 7px;
            margin-bottom: 10px;
        }

        .ai-panel-title {
            font-size: 12px; font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .ai-panel-body { color: var(--text-secondary); font-size: 13px; line-height: 1.8; }

        .ai-suggestion {
            margin-top: 12px; padding: 12px;
            background: rgba(16, 185, 129, 0.06);
            border: 1px solid rgba(16, 185, 129, 0.16);
            border-radius: var(--radius-inner);
        }

        .ai-suggestion-label {
            font-size: 10px; font-weight: 700; color: var(--success);
            letter-spacing: 0.05em; text-transform: uppercase;
            margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
        }

        /* ── Media Container ── */
        .media-container {
            width: 100%; border-radius: var(--radius-inner);
            overflow: hidden; background: #000;
            display: flex; justify-content: center; min-height: 64px;
        }

        video { width: 100%; max-height: 240px; }
        audio { width: 100%; margin: 14px 0 4px; }

        /* ── Game Area ── */
        .game-area {
            position: relative; width: 100%; height: 220px;
            background: linear-gradient(180deg, #07070d 0%, #0c0c15 100%);
            border-radius: var(--radius-inner);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: inset 0 0 48px rgba(0, 0, 0, 0.88), 0 0 20px rgba(99, 102, 241, 0.06);
        }

        canvas { display: block; width: 100%; height: 100%; }

        .hud {
            position: absolute; top: 14px; right: 20px;
            text-align: right; pointer-events: none;
        }

        .score {
            font-size: 32px; font-weight: 900;
            color: #f5c842;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: 2px;
            text-shadow: 0 0 16px rgba(245, 200, 66, 0.45);
        }

        .combo {
            font-size: 13px; color: var(--success); font-weight: 700;
            margin-top: -2px; letter-spacing: 2px;
        }

        .express-score { font-size: 11px; color: var(--accent); margin-top: 4px; }

        .judgement-text {
            position: absolute; top: 50%; left: 18%;
            transform: translate(-50%, -50%);
            font-size: 50px; font-weight: 900; font-style: italic;
            text-transform: uppercase; pointer-events: none; opacity: 0; z-index: 10;
        }

        .anim-perfect { color: #00e5ff; text-shadow: 0 0 26px #00e5ff, 0 0 52px #00e5ff; animation: popFade .6s cubic-bezier(.175,.885,.32,1.275) forwards; }
        .anim-great { color: var(--success); text-shadow: 0 0 26px var(--success); animation: popFade .5s ease-out forwards; }
        .anim-miss { color: var(--danger); animation: dropFade .5s ease-in forwards; }

        @keyframes popFade {
            0% { opacity: 0; transform: translate(-50%,-50%) scale(.3); }
            30% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%,-60%) scale(.9); }
        }

        @keyframes dropFade {
            0% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%,-20%) scale(.8); }
        }

        /* ── Log Box ── */
        .log-section { margin-top: 18px; }

        .log-label {
            font-size: 10px; font-weight: 700;
            color: var(--text-muted); letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 7px;
        }

        .log-box {
            background: rgba(3, 3, 7, 0.88);
            padding: 11px 13px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: rgba(52, 211, 153, 0.82);
            font-size: 11px;
            border-radius: var(--radius-inner);
            height: 84px; overflow-y: auto;
            border: 1px solid rgba(16, 185, 129, 0.12);
            line-height: 1.7;
        }

        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-track { background: transparent; }
        .log-box::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }

        /* ── Settings Modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.76);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; animation: fadeIn .22s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            background: var(--bg-elevated);
            border-radius: 18px;
            padding: 26px 26px 22px;
            max-width: 440px; width: 90%;
            border: 1px solid var(--border);
            box-shadow: 0 32px 72px rgba(0, 0, 0, 0.6);
            animation: slideUp .22s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 22px;
        }

        .modal-title {
            font-size: 17px; font-weight: 700; color: var(--text-primary);
            display: flex; align-items: center; gap: 9px;
        }

        .modal-close {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 17px; transition: background .16s, color .16s;
        }

        .modal-close:hover { background: rgba(239, 68, 68, 0.16); color: var(--danger); }

        .modal-section { margin-bottom: 18px; }

        .modal-label {
            font-size: 11px; font-weight: 600; color: var(--text-secondary);
            margin-bottom: 7px; display: flex; align-items: center; gap: 6px;
        }

        .api-input-wrapper { position: relative; }

        .api-input {
            width: 100%; padding: 11px 44px 11px 15px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-inner);
            color: var(--text-primary); font-size: 13px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            transition: border-color .2s, box-shadow .2s;
        }

        .api-input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .api-input::placeholder { color: var(--text-muted); font-family: inherit; }

        .toggle-visibility {
            position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 4px; transition: color .16s;
        }

        .toggle-visibility:hover { color: var(--primary-light); }

        .modal-help {
            font-size: 10px; color: var(--text-muted);
            margin-top: 9px; line-height: 1.7;
        }

        .modal-help a { color: var(--primary-light); text-decoration: none; }
        .modal-help a:hover { text-decoration: underline; }

        .save-status {
            display: flex; align-items: center; gap: 6px;
            margin-top: 11px; font-size: 11px; color: var(--success);
            opacity: 0; transition: opacity .28s;
        }

        .save-status.visible { opacity: 1; }

        .modal-footer { display: flex; gap: 9px; margin-top: 22px; }
        .modal-footer .btn { flex: 1; }

        /* ── Spinner ── */
        .spinner {
            width: 15px; height: 15px;
            border: 2px solid rgba(255,255,255,.22);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .72s linear infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            body { padding: 14px 10px 52px; }
            .panel-body { padding: 14px 14px 18px; }
            .panel-header { padding: 14px 14px 12px; }
            .game-area { height: 190px; }
            .score { font-size: 26px; }
            h1 { font-size: 22px; }
            .logo-icon { font-size: 34px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script id="worker-script" type="javascript/worker">
        self.onerror = function(err) { self.postMessage({ status: 'error', msg: '后台分析线程异常' }); };

        self.onmessage = async function(e) {
            const { type, audioData, sampleRate, sensitivity, minGapMs } = e.data;
            if (type === 'ANALYZE') {
                self.postMessage({ status: 'info', msg: '启动琵琶动态力度分析引擎...' });

                const analyzeAudio = (audio, sr) => {
                    const windowSize = 1024, hopSize = 512;
                    const energies = [], energyFlux = [], onsets = [];
                    let maxEnergy = 0;

                    self.postMessage({ status: 'info', msg: '正在提取能量波带数据...' });

                    for (let i = 0; i < audio.length - windowSize; i += hopSize) {
                        let sum = 0;
                        for (let j = 0; j < windowSize; j++) sum += audio[i + j] * audio[i + j];
                        const rms = Math.sqrt(sum / windowSize);
                        energies.push(rms);
                        if (rms > maxEnergy) maxEnergy = rms;
                    }

                    for (let i = 1; i < energies.length; i++) {
                        let diff = energies[i] - energies[i-1];
                        energyFlux.push(diff > 0 ? diff : 0);
                    }
                    energyFlux.unshift(0);

                    const meanWindow = 15;
                    const minOnsetGapFrames = Math.floor((minGapMs / 1000) * sr / hopSize);
                    let lastOnsetFrame = -minOnsetGapFrames;

                    for (let i = meanWindow; i < energyFlux.length - 1; i++) {
                        if (energyFlux[i] > energyFlux[i - 1] && energyFlux[i] > energyFlux[i + 1]) {
                            let sum = 0;
                            for (let j = 1; j <= meanWindow; j++) sum += energyFlux[i - j];
                            let localMean = sum / meanWindow;

                            if (energyFlux[i] > localMean * sensitivity && energyFlux[i] > 0.005) {
                                if (i - lastOnsetFrame >= minOnsetGapFrames) {
                                    onsets.push(((i * hopSize) / sr) * 1000);
                                    lastOnsetFrame = i;
                                }
                            }
                        }
                    }

                    const envSampleRate = 10;
                    const envHopFrames = Math.floor(sr / hopSize / envSampleRate);
                    const envelope = [];

                    for (let i = 0; i < energies.length; i += envHopFrames) {
                        let localMax = 0;
                        for(let j = 0; j < envHopFrames && (i+j) < energies.length; j++){
                            if(energies[i+j] > localMax) localMax = energies[i+j];
                        }
                        envelope.push({
                            time: ((i * hopSize) / sr) * 1000,
                            intensity: maxEnergy > 0 ? (localMax / maxEnergy) : 0
                        });
                    }

                    return { onsets, envelope };
                };

                setTimeout(() => {
                    const result = analyzeAudio(audioData, sampleRate || 44100);
                    self.postMessage({
                        status: 'success',
                        msg: `分析完毕 — 音符 ${result.onsets.length} 个，波带节点 ${result.envelope.length} 个。`,
                        data: result
                    });
                }, 50);
            }
        };
    </script>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        const RibbonGameArea = ({ mediaRef, beatmapData, isPlaying }) => {
            const canvasRef = useRef(null);
            const reqRef = useRef(null);
            const { onsets, envelope } = beatmapData;

            const [score, setScore] = useState(0);
            const [combo, setCombo] = useState(0);
            const [expressScore, setExpressScore] = useState(0);
            const [judgement, setJudgement] = useState({ text: '', type: '', id: 0 });

            const micCtxRef = useRef(null);
            const analyserRef = useRef(null);
            const isMicReady = useRef(false);

            const gs = useRef({
                lastJudgedIndex: -1,
                cooldownUntil: 0,
                speed: 0.3,
                judgementLineX: 0,
                playerMaxVolHistory: 0.01,
                currentPlayerVol: 0
            });

            const THRESHOLD = 0.1;
            const PERFECT_WIN = 100;
            const GREAT_WIN = 200;
            const COOLDOWN = 120;
            const RIBBON_BASE_HEIGHT = 10;
            const RIBBON_MAX_HEIGHT = 80;

            useEffect(() => {
                const media = mediaRef.current;
                if (!media) return;

                const handleSeek = () => {
                    const currentTime = media.currentTime * 1000;

                    if (currentTime < 100) {
                        setScore(0); setCombo(0); setExpressScore(0);
                    }

                    let newIndex = -1;
                    for (let i = 0; i < onsets.length; i++) {
                        if (onsets[i] < currentTime - GREAT_WIN) newIndex = i;
                        else break;
                    }
                    gs.current.lastJudgedIndex = newIndex;
                    gs.current.cooldownUntil = 0;
                    setJudgement({ text: '', type: '', id: Date.now() });
                };

                media.addEventListener('seeked', handleSeek);
                return () => media.removeEventListener('seeked', handleSeek);
            }, [onsets]);

            useEffect(() => {
                const initMic = async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        micCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                        analyserRef.current = micCtxRef.current.createAnalyser();
                        analyserRef.current.fftSize = 256;
                        analyserRef.current.smoothingTimeConstant = 0.6;
                        const source = micCtxRef.current.createMediaStreamSource(stream);
                        source.connect(analyserRef.current);
                        isMicReady.current = true;
                    } catch (e) { console.error("麦克风权限被拒绝", e); }
                };
                initMic();
                return () => { if (micCtxRef.current) micCtxRef.current.close(); };
            }, []);

            const loop = useCallback(() => {
                const canvas = canvasRef.current;
                const media = mediaRef.current;
                if (!canvas || !media || !isMicReady.current) {
                    reqRef.current = requestAnimationFrame(loop);
                    return;
                }

                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const centerY = height / 2;
                const currentTime = media.currentTime * 1000;

                gs.current.judgementLineX = width * 0.2;
                const { judgementLineX, speed, lastJudgedIndex } = gs.current;

                const bufferLength = analyserRef.current.frequencyBinCount;
                const dataArray = new Float32Array(bufferLength);
                analyserRef.current.getFloatTimeDomainData(dataArray);

                let sum = 0;
                for (let i = 0; i < bufferLength; i++) sum += dataArray[i] * dataArray[i];
                let rms = Math.sqrt(sum / bufferLength);

                if (rms > gs.current.playerMaxVolHistory) gs.current.playerMaxVolHistory = rms;
                else gs.current.playerMaxVolHistory *= 0.9995;

                let relativeVol = gs.current.playerMaxVolHistory > 0 ? (rms / gs.current.playerMaxVolHistory) : 0;
                gs.current.currentPlayerVol = Math.min(1, relativeVol * 1.5);

                if (rms > THRESHOLD && performance.now() > gs.current.cooldownUntil) {
                    let minDiff = Infinity, targetIndex = -1;

                    for (let i = lastJudgedIndex + 1; i < onsets.length; i++) {
                        const diff = Math.abs(currentTime - onsets[i]);
                        if (diff < minDiff) { minDiff = diff; targetIndex = i; }
                    }

                    if (targetIndex !== -1 && minDiff <= GREAT_WIN) {
                        gs.current.lastJudgedIndex = targetIndex;
                        gs.current.cooldownUntil = performance.now() + COOLDOWN;

                        let expectedIntensity = 0;
                        for(let i = 0; i < envelope.length; i++) {
                            if(envelope[i].time > currentTime) {
                                expectedIntensity = i > 0 ? envelope[i-1].intensity : envelope[0].intensity;
                                break;
                            }
                        }

                        let intensityDiff = Math.abs(gs.current.currentPlayerVol - expectedIntensity);
                        let expressBonus = 0;
                        if(intensityDiff < 0.2) expressBonus = 50;
                        else if(intensityDiff < 0.4) expressBonus = 20;

                        if (minDiff <= PERFECT_WIN) {
                            setJudgement({ text: 'Perfect', type: 'anim-perfect', id: Date.now() });
                            setScore(s => s + 100 + expressBonus);
                            setCombo(c => c + 1);
                        } else {
                            setJudgement({ text: 'Great', type: 'anim-great', id: Date.now() });
                            setScore(s => s + 50 + Math.floor(expressBonus/2));
                            setCombo(c => c + 1);
                        }

                        if(expressBonus > 0) setExpressScore(prev => prev + expressBonus);
                    }
                }

                ctx.clearRect(0, 0, width, height);

                ctx.shadowBlur = 14;
                ctx.shadowColor = 'rgba(255, 215, 0, 0.55)';
                ctx.beginPath();
                ctx.moveTo(judgementLineX, 18);
                ctx.lineTo(judgementLineX, height - 18);
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.75)';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.beginPath();
                let visibleEnv = envelope.filter(pt => {
                    const x = (pt.time - currentTime) * speed + judgementLineX;
                    return x > -100 && x < width + 100;
                });

                if (visibleEnv.length > 1) {
                    ctx.moveTo((visibleEnv[0].time - currentTime) * speed + judgementLineX, centerY - (RIBBON_BASE_HEIGHT + visibleEnv[0].intensity * RIBBON_MAX_HEIGHT));
                    for (let i = 1; i < visibleEnv.length - 1; i++) {
                        const xc = (visibleEnv[i].time - currentTime) * speed + judgementLineX;
                        const yc = centerY - (RIBBON_BASE_HEIGHT + visibleEnv[i].intensity * RIBBON_MAX_HEIGHT);
                        const nextXc = (visibleEnv[i+1].time - currentTime) * speed + judgementLineX;
                        const nextYc = centerY - (RIBBON_BASE_HEIGHT + visibleEnv[i+1].intensity * RIBBON_MAX_HEIGHT);
                        ctx.quadraticCurveTo(xc, yc, (xc + nextXc) / 2, (yc + nextYc) / 2);
                    }
                    const lastPt = visibleEnv[visibleEnv.length-1];
                    const lastX = (lastPt.time - currentTime) * speed + judgementLineX;
                    ctx.lineTo(lastX, centerY + (RIBBON_BASE_HEIGHT + lastPt.intensity * RIBBON_MAX_HEIGHT));
                    for (let i = visibleEnv.length - 2; i > 0; i--) {
                        const xc = (visibleEnv[i].time - currentTime) * speed + judgementLineX;
                        const yc = centerY + (RIBBON_BASE_HEIGHT + visibleEnv[i].intensity * RIBBON_MAX_HEIGHT);
                        const prevXc = (visibleEnv[i-1].time - currentTime) * speed + judgementLineX;
                        const prevYc = centerY + (RIBBON_BASE_HEIGHT + visibleEnv[i-1].intensity * RIBBON_MAX_HEIGHT);
                        ctx.quadraticCurveTo(xc, yc, (xc + prevXc) / 2, (yc + prevYc) / 2);
                    }
                    ctx.lineTo((visibleEnv[0].time - currentTime) * speed + judgementLineX, centerY + (RIBBON_BASE_HEIGHT + visibleEnv[0].intensity * RIBBON_MAX_HEIGHT));
                    ctx.closePath();
                    const gradient = ctx.createLinearGradient(0, 0, width, 0);
                    gradient.addColorStop(0, 'rgba(100, 200, 255, 0.08)');
                    gradient.addColorStop(0.2, 'rgba(100, 200, 255, 0.35)');
                    gradient.addColorStop(1, 'rgba(100, 200, 255, 0.08)');
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(100, 200, 255, 0.55)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                for (let i = lastJudgedIndex + 1; i < onsets.length; i++) {
                    const noteTime = onsets[i];
                    const x = (noteTime - currentTime) * speed + judgementLineX;
                    if (x < judgementLineX - (GREAT_WIN * speed)) {
                        gs.current.lastJudgedIndex = i;
                        setJudgement({ text: 'Miss', type: 'anim-miss', id: Date.now() });
                        setCombo(0);
                        continue;
                    }
                    if (x > -20 && x < width + 20) {
                        ctx.beginPath();
                        ctx.arc(x, centerY, 4, 0, Math.PI * 2);
                        ctx.fillStyle = '#fff';
                        ctx.fill();
                    }
                }

                const playerBallRadius = 8 + (gs.current.currentPlayerVol * RIBBON_MAX_HEIGHT);
                ctx.beginPath();
                ctx.arc(judgementLineX, centerY, playerBallRadius, 0, Math.PI * 2);

                if(gs.current.currentPlayerVol > 0.8) {
                    ctx.fillStyle = 'rgba(255, 100, 100, 0.8)';
                    ctx.shadowColor = 'rgba(255, 100, 100, 1)';
                } else if (gs.current.currentPlayerVol < 0.2) {
                    ctx.fillStyle = 'rgba(150, 150, 150, 0.5)';
                    ctx.shadowColor = 'rgba(150, 150, 150, 0.5)';
                } else {
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.88)';
                    ctx.shadowColor = 'rgba(255, 215, 0, 1)';
                }

                ctx.shadowBlur = 14;
                ctx.fill();
                ctx.shadowBlur = 0;

                reqRef.current = requestAnimationFrame(loop);
            }, [onsets, envelope]);

            useEffect(() => {
                if (isPlaying) reqRef.current = requestAnimationFrame(loop);
                else cancelAnimationFrame(reqRef.current);
                return () => cancelAnimationFrame(reqRef.current);
            }, [isPlaying, loop]);

            useEffect(() => {
                const resize = () => {
                    const canvas = canvasRef.current;
                    if (canvas) {
                        canvas.width = canvas.parentElement.clientWidth;
                        canvas.height = canvas.parentElement.clientHeight;
                    }
                };
                resize();
                window.addEventListener('resize', resize);
                return () => window.removeEventListener('resize', resize);
            }, []);

            return (
                <div className="game-area">
                    <canvas ref={canvasRef}></canvas>
                    <div className="hud">
                        <div className="score">{score}</div>
                        <div className="combo">{combo > 0 ? `${combo} COMBO` : ''}</div>
                        {expressScore > 0 && <div className="express-score">+{expressScore}</div>}
                    </div>
                    <div key={judgement.id} className={`judgement-text ${judgement.type}`}>
                        {judgement.text}
                    </div>
                </div>
            );
        };

        const SettingsModal = ({ isOpen, onClose, apiKey, setApiKey, onSave }) => {
            const [localApiKey, setLocalApiKey] = useState(apiKey);
            const [showKey, setShowKey] = useState(false);
            const [showSaved, setShowSaved] = useState(false);

            useEffect(() => { setLocalApiKey(apiKey); }, [apiKey]);

            const handleSave = () => {
                const trimmedKey = localApiKey.trim();
                if (trimmedKey) {
                    localStorage.setItem('pipa_app_gemini_api_key', trimmedKey);
                    setApiKey(trimmedKey);
                    setShowSaved(true);
                    setTimeout(() => setShowSaved(false), 2000);
                    if (onSave) onSave(trimmedKey);
                }
            };

            const handleClear = () => {
                localStorage.removeItem('pipa_app_gemini_api_key');
                setLocalApiKey('');
                setApiKey('');
                setShowSaved(true);
                setTimeout(() => setShowSaved(false), 2000);
            };

            if (!isOpen) return null;

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">
                                <span>API 设置</span>
                            </h2>
                            <button type="button" className="modal-close" onClick={onClose} aria-label="关闭">×</button>
                        </div>

                        <div className="modal-section">
                            <label className="modal-label">Google Gemini API Key</label>
                            <div className="api-input-wrapper">
                                <input
                                    type={showKey ? 'text' : 'password'}
                                    className="api-input"
                                    value={localApiKey}
                                    onChange={e => setLocalApiKey(e.target.value)}
                                    placeholder="输入你的 Gemini API Key..."
                                    autoComplete="off"
                                    spellCheck="false"
                                />
                                <button
                                    type="button"
                                    className="toggle-visibility"
                                    onClick={() => setShowKey(!showKey)}
                                    title={showKey ? '隐藏' : '显示'}
                                >
                                    {showKey ? '👁' : '👁‍🗨'}
                                </button>
                            </div>
                            <p className="modal-help">
                                此 Key 仅存储在浏览器本地 (localStorage)，不会上传至任何服务器。<br/>
                                获取方式：访问 <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer">Google AI Studio</a> 免费申请。
                            </p>
                            <div className={`save-status ${showSaved ? 'visible' : ''}`}>
                                <span>✓</span> 设置已保存
                            </div>
                        </div>

                        <div className="modal-footer">
                            <button type="button" className="btn btn-ghost" onClick={handleClear}>清除</button>
                            <button type="button" className="btn btn-primary" onClick={handleSave}>保存设置</button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const mediaRef = useRef(null);
            const workerRef = useRef(null);
            const fileInputRef = useRef(null);

            const [fileInfo, setFileInfo] = useState({ url: null, name: '', type: null, rawFile: null });
            const [beatmapData, setBeatmapData] = useState({ onsets: [], envelope: [] });
            const [isPlaying, setIsPlaying] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [logs, setLogs] = useState(["系统初始化完成。请先上传曲目文件。"]);

            const [pieceName, setPieceName] = useState('');
            const [aiResponse, setAiResponse] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [sensitivity, setSensitivity] = useState(1.6);
            const [minGap, setMinGap] = useState(60);
            const [aiHasSuggested, setAiHasSuggested] = useState(false);

            const [apiKey, setApiKey] = useState('');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 8));

            useEffect(() => {
                const savedKey = localStorage.getItem('pipa_app_gemini_api_key');
                if (savedKey) setApiKey(savedKey);
            }, []);

            useEffect(() => {
                const workerScript = document.getElementById('worker-script').textContent;
                const blob = new Blob([workerScript], { type: 'application/javascript' });
                workerRef.current = new Worker(URL.createObjectURL(blob));

                workerRef.current.onerror = () => addLog(`严重错误: 分析线程崩溃。`);
                workerRef.current.onmessage = (e) => {
                    const { status, msg, data } = e.data;
                    addLog(msg);
                    if (status === 'success') {
                        setBeatmapData(data);
                        setIsAnalyzing(false);
                    }
                };
                return () => workerRef.current.terminate();
            }, []);

            useEffect(() => {
                const media = mediaRef.current;
                if (!media) return;
                const onPlay = () => setIsPlaying(true);
                const onPause = () => setIsPlaying(false);
                media.addEventListener('play', onPlay);
                media.addEventListener('pause', onPause);
                media.addEventListener('seeking', onPause);
                return () => {
                    media.removeEventListener('play', onPlay);
                    media.removeEventListener('pause', onPause);
                    media.removeEventListener('seeking', onPause);
                };
            }, [fileInfo.url]);

            const processFileForAnalysis = async (file) => {
                setIsAnalyzing(true);
                addLog("正在提取时间戳与能量包络...");
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
                    const channelData = audioBuffer.getChannelData(0);
                    workerRef.current.postMessage({
                        type: 'ANALYZE', audioData: channelData, sampleRate: audioBuffer.sampleRate,
                        sensitivity: sensitivity, minGapMs: minGap
                    });
                    ctx.close();
                } catch (err) {
                    addLog("解析失败: " + err.message);
                    setIsAnalyzing(false);
                }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const isAudio = file.type.startsWith('audio/');
                setFileInfo({ url: URL.createObjectURL(file), name: file.name, type: isAudio ? 'audio' : 'video', rawFile: file });
                setPieceName(file.name.replace(/\.[^/.]+$/, ""));
                setAiResponse(''); setAiHasSuggested(false);
                setBeatmapData({ onsets: [], envelope: [] });
                setIsPlaying(false);
                processFileForAnalysis(file);
            };

            const applyAiParamsAndRegenerate = () => {
                if (fileInfo.rawFile) {
                    setAiHasSuggested(false);
                    processFileForAnalysis(fileInfo.rawFile);
                }
            };

            const fetchAIAdvice = async () => {
                if (!pieceName) return;

                if (!apiKey) {
                    setIsSettingsOpen(true);
                    setAiResponse('请先配置 Gemini API Key 才能使用 AI 功能。');
                    return;
                }

                setIsAiLoading(true); setAiResponse('');

                const modelName = "gemini-2.5-flash";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

                const prompt = `你是一位资深琵琶教育家。你的学生正练习《${pieceName}》。
请返回JSON格式：
1. advice: 300字左右的专业课前指导寄语（含简介、技巧提示、情感启发）。
2. recommendedSensitivity: 推荐的拾音灵敏度 (1.0-3.0)。
3. recommendedMinGap: 推荐的音符最小间隔 (20-150ms)。`;

                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        throw new Error(`网络或授权异常 (状态码: ${res.status}) ${errData.error?.message || ''}`);
                    }

                    const data = await res.json();
                    const jsonStr = data.candidates[0].content.parts[0].text;
                    const parsed = JSON.parse(jsonStr);
                    setAiResponse(parsed.advice);
                    setSensitivity(parsed.recommendedSensitivity);
                    setMinGap(parsed.recommendedMinGap);
                    setAiHasSuggested(true);
                    addLog(`AI 调参 -> 灵敏度: ${parsed.recommendedSensitivity}, 间隔: ${parsed.recommendedMinGap}ms`);
                } catch (err) {
                    if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
                        setAiResponse(`网络连接失败！Google 服务器在国内可能无法直接访问。请检查网络或使用代理。`);
                    } else if (err.message.includes('401') || err.message.includes('403')) {
                        setAiResponse(`API Key 无效或权限不足。请检查 API Key 是否正确，或前往设置重新配置。`);
                        addLog(`API Key 可能已失效，请重新配置`);
                    } else {
                        setAiResponse(`AI 老师遇到了一点小麻烦：${err.message}`);
                    }
                    addLog(`AI 调参失败: ${err.message}`);
                } finally { setIsAiLoading(false); }
            };

            const hasApiKey = apiKey && apiKey.length > 0;

            return (
                <div className="app-container">
                    {/* Top Bar */}
                    <div className="top-bar">
                        <div className="top-bar-label">
                            <span className="dot"></span>
                            琵琶练习台
                        </div>
                        <button
                            type="button"
                            className="btn btn-ghost btn-icon"
                            onClick={() => setIsSettingsOpen(true)}
                            title="API 设置"
                            aria-label="打开 API 设置"
                        >
                            ⚙
                        </button>
                    </div>

                    {/* Header */}
                    <div className="header-section">
                        <div className="header-content">
                            <div className="logo-icon">🎵</div>
                            <h1>琵琶练习台</h1>
                            <p className="subtitle">动态力度追踪版</p>
                        </div>
                    </div>

                    {/* Main Panel */}
                    <div className="panel">
                        <div className="panel-header">
                            <div className="panel-title">
                                <span className="panel-title-icon"></span>
                                开始练习
                            </div>
                            <span className={`status-badge ${hasApiKey ? 'ok' : 'warn'}`} role="status">
                                <span className={`status-dot ${hasApiKey ? 'green' : 'yellow'}`} aria-hidden="true"></span>
                                {hasApiKey ? 'API 已配置' : 'API 未配置'}
                            </span>
                        </div>

                        <div className="panel-body">
                            {/* Row 1: Upload */}
                            <div className="control-row">
                                <input type="file" accept="video/*,audio/*,.mp3,.mp4,.wav,.m4a,.mov,.aac" onChange={handleFileUpload} ref={fileInputRef} style={{display:'none'}} />
                                <button type="button" className="btn btn-primary" onClick={() => fileInputRef.current.click()}>
                                    📂 加载曲目
                                </button>
                                {fileInfo.name && (
                                    <span style={{fontSize:'12px',color:'var(--text-secondary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'200px'}}>
                                        {fileInfo.name}
                                    </span>
                                )}
                            </div>

                            {/* Row 2: Track name + AI */}
                            <div className="control-row">
                                <input
                                    type="text"
                                    value={pieceName}
                                    onChange={(e) => { setPieceName(e.target.value); setAiHasSuggested(false); }}
                                    placeholder="输入曲目名称..."
                                    className="input-field"
                                    style={{ flex: 1, minWidth: '140px' }}
                                />
                                <button
                                    type="button"
                                    className="btn btn-ai"
                                    onClick={fetchAIAdvice}
                                    disabled={isAiLoading || !pieceName}
                                >
                                    {isAiLoading ? (
                                        <><span className="spinner"></span> 分析中</>
                                    ) : (
                                        <>✨ AI 智能调参</>
                                    )}
                                </button>
                            </div>

                            {/* AI Panel */}
                            {aiResponse && (
                                <div className="ai-panel">
                                    <div className="ai-panel-header">
                                        <span style={{fontSize:'13px'}}>✨</span>
                                        <span className="ai-panel-title">AI 课前寄语</span>
                                    </div>
                                    <div className="ai-panel-body" style={{ whiteSpace: 'pre-wrap' }}>{aiResponse}</div>
                                    {aiHasSuggested && fileInfo.rawFile && (
                                        <div className="ai-suggestion">
                                            <div className="ai-suggestion-label">
                                                💡 已应用《{pieceName}》专属提取参数
                                            </div>
                                            <button type="button" className="btn btn-ghost" onClick={applyAiParamsAndRegenerate} style={{fontSize:'12px',height:'32px',padding:'0 12px'}}>
                                                🚀 按新参数重新生成谱面
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Media */}
                            {fileInfo.url && (
                                <div className="media-container">
                                    {fileInfo.type === 'video' ?
                                        <video ref={mediaRef} src={fileInfo.url} controls controlsList="nodownload" playsInline webkit-playsinline x5-playsinline x5-video-player-type="h5" x5-video-player-fullscreen="false" />
                                        : <audio ref={mediaRef} src={fileInfo.url} controls />
                                    }
                                </div>
                            )}

                            {/* Game Area */}
                            {beatmapData.onsets.length > 0 && (
                                <RibbonGameArea mediaRef={mediaRef} beatmapData={beatmapData} isPlaying={isPlaying} />
                            )}

                            {/* Log */}
                            <div className="log-section">
                                <div className="log-label">
                                    System Logs {isAnalyzing && <span className="spinner" style={{width:'10px',height:'10px',display:'inline-block',verticalAlign:'middle',marginLeft:'6px'}}></span>}
                                </div>
                                <div className="log-box">{logs.map((log, i) => <div key={i}>&gt; {log}</div>)}</div>
                            </div>
                        </div>
                    </div>

                    {/* Settings Modal */}
                    <SettingsModal
                        isOpen={isSettingsOpen}
                        onClose={() => setIsSettingsOpen(false)}
                        apiKey={apiKey}
                        setApiKey={setApiKey}
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
